<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>John Michael Homepage</title>

<style>

/* BODY BACKGROUND */
body{
font-family:'Segoe UI',sans-serif;
margin:0;
padding:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
background-size:400% 400%;
animation:bgMove 12s infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* CONTAINER */

.container{
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:16px;
box-shadow:0 8px 32px rgba(0,0,0,0.4);
width:100%;
max-width:400px;
text-align:center;
backdrop-filter:blur(10px);
}

/* TITLES */

h1,h2{
color:#1e3c72;
}

/* INPUTS */

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:2px solid #ddd;
font-size:14px;
}

input:focus{
outline:none;
border-color:#2a5298;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:translateY(-2px);
}

/* LINKS */

.menu{
margin:25px 0;
display:flex;
flex-direction:column;
gap:10px;
}

.menu a{
padding:12px;
border-radius:10px;
background:#e8f4fd;
text-decoration:none;
color:#1e3c72;
font-weight:bold;
transition:0.3s;
}

.menu a:hover{
background:#1e3c72;
color:white;
transform:scale(1.05);
}

/* HERO SECTION */

.hero-section{
margin-top:20px;
text-align:center;
}

.hero-img{
width:170px;
animation:floatHero 4s ease-in-out infinite, glowHero 3s infinite alternate;
}

.hero-title{
margin-top:10px;
font-size:20px;
color:#ff4500;
letter-spacing:2px;
font-weight:bold;
}

/* HERO ANIMATION */

@keyframes floatHero{
0%{transform:translateY(0);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0);}
}

@keyframes glowHero{
from{filter:drop-shadow(0 0 5px #ff4500);}
to{filter:drop-shadow(0 0 20px red);}
}

/* UTILITIES */

.hidden{
display:none;
}

.error-message{
color:red;
font-size:14px;
display:none;
}

.logout-btn{
background:#dc3545;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<!-- AUTH SECTION -->

<div id="auth-section">

<form id="signup-form">

<h2>Create Account</h2>

<input type="text" id="signup-username" placeholder="Username" required>

<input type="email" id="signup-email" placeholder="Email" required>

<input type="password" id="signup-password" placeholder="Password" required>

<button type="submit">Sign Up</button>

<p>Already have account? <a href="#" id="show-signin">Sign In</a></p>

</form>


<form id="signin-form" class="hidden">

<h2>Welcome Back</h2>

<input type="text" id="signin-username" placeholder="Username" required>

<input type="password" id="signin-password" placeholder="Password" required>

<button type="submit">Sign In</button>

<p>No account? <a href="#" id="show-signup">Sign Up</a></p>

<p class="error-message" id="error-message">Wrong username or password</p>

</form>

</div>

<!-- HOMEPAGE -->

<div id="homepage-container" class="hidden">

<h1>Welcome John Michael!</h1>

<p>This is your personal homepage.</p>

<!-- HERO SECTION -->

<div class="hero-section">

<img src="https://static.wikia.nocookie.net/mobile-legends/images/4/44/Thamuz.png" class="hero-img">

<div class="hero-title">THAMUZ - LORD OF FIRE</div>

</div>

<!-- MENU -->

<div class="menu">

<a href="collection.html">📦 Collection</a>

<a href="education.html">📚 Education</a>

<a href="personal.html">👤 Personal</a>

<a href="family.html">👨‍👩‍👧 Family</a>

</div>

<button class="logout-btn" id="logout-btn">Logout</button>

</div>

</div>

<script>

/* SWITCH FORMS */

document.getElementById("show-signin").onclick=function(e){
e.preventDefault();
document.getElementById("signup-form").classList.add("hidden");
document.getElementById("signin-form").classList.remove("hidden");
};

document.getElementById("show-signup").onclick=function(e){
e.preventDefault();
document.getElementById("signin-form").classList.add("hidden");
document.getElementById("signup-form").classList.remove("hidden");
};

/* SIGNIN */

document.getElementById("signin-form").addEventListener("submit",function(e){

e.preventDefault();

let user=document.getElementById("signin-username").value;
let pass=document.getElementById("signin-password").value;

if(user==="johnmichael" && pass==="johnmichael"){

localStorage.setItem("isAuthenticated","true");

document.getElementById("auth-section").style.display="none";

document.getElementById("homepage-container").style.display="block";

}else{

document.getElementById("error-message").style.display="block";

}

});

/* SIGNUP */

document.getElementById("signup-form").addEventListener("submit",function(e){

e.preventDefault();

localStorage.setItem("isAuthenticated","true");

document.getElementById("auth-section").style.display="none";

document.getElementById("homepage-container").style.display="block";

});

/* LOGOUT */

document.getElementById("logout-btn").onclick=function(){

localStorage.clear();

location.reload();

};

</script>

</body>
</html>
